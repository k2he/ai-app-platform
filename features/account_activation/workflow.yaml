# Account Activation Workflow
extends: ../../platform/workflows/_base.yaml

workflow:
  name: account-activation
  description: Allow customers to activate their accounts

  nodes:
    - id: activate_account
      type: subgraph
      subgraph: activation_flow

  guardrails:
    optional:
      - document_verification

  edges:
    - from: collect_intent
      router: llm_intent
      description: "What does the customer want to do?"
      routes:
        activate_account: activate_account
        other: greet

    - from: activate_account
      to: farewell

# ─────────────────────────────────────────────────────────
# SUBGRAPH: Account Activation Flow
# ─────────────────────────────────────────────────────────
subgraphs:
  activation_flow:
    description: Multi-step flow to verify eligibility and activate account

    nodes:
      - id: check_eligibility
        type: custom
        handler: "features.account_activation.handlers.check_activation_eligibility"

      - id: already_active_msg
        type: llm_response
        prompt_template: "already_active.jinja2"

      - id: blocked_msg
        type: llm_response
        prompt_template: "account_blocked.jinja2"

      - id: collect_documents
        type: llm_conversation
        prompt_template: "request_documents.jinja2"
        output_schema: DocumentUploadSchema

      - id: select_preferences
        type: llm_conversation
        prompt_template: "account_preferences.jinja2"
        output_schema: AccountPreferencesSchema

      - id: confirm_activation
        type: llm_response
        prompt_template: "confirm_activation.jinja2"

      - id: perform_activation
        type: custom
        handler: "features.account_activation.handlers.activate_account_in_system"

      - id: activation_success
        type: llm_response
        prompt_template: "activation_complete.jinja2"

    edges:
      - from: START
        to: check_eligibility

      - from: check_eligibility
        router: validation_result
        description: "Is the account eligible for activation?"
        routes:
          eligible: select_preferences
          already_active: already_active_msg
          blocked: blocked_msg
          pending_documents: collect_documents

      - from: already_active_msg
        to: END
      - from: blocked_msg
        to: END

      - from: collect_documents
        router: llm_intent
        description: "Did the customer provide required documents?"
        routes:
          documents_provided: check_eligibility
          need_help: END

      - from: select_preferences
        router: llm_intent
        description: "Did the customer set their account preferences?"
        routes:
          preferences_set: confirm_activation
          questions: select_preferences

      - from: confirm_activation
        router: llm_intent
        description: "Did the customer confirm activation?"
        routes:
          confirmed: perform_activation
          cancel: END
          edit_preferences: select_preferences

      - from: perform_activation
        router: validation_result
        description: "Did the activation succeed?"
        routes:
          success: activation_success
          error: END

      - from: activation_success
        to: END

# ─────────────────────────────────────────────────────────
# SCHEMAS: Structured output definitions
# ─────────────────────────────────────────────────────────
schemas:
  DocumentUploadSchema:
    type: object
    properties:
      document_type:
        type: string
        enum: [drivers_license, passport, utility_bill, bank_statement]
      document_id:
        type: string
        description: Reference ID from document upload service
      verification_status:
        type: string
        enum: [pending, verified, rejected]
    required: [document_type]

  AccountPreferencesSchema:
    type: object
    properties:
      paperless_billing:
        type: boolean
        default: true
      notification_email:
        type: boolean
        default: true
      notification_sms:
        type: boolean
        default: false
      preferred_contact_time:
        type: string
        enum: [morning, afternoon, evening, anytime]
    required: [paperless_billing]
