# Card Replacement Workflow
extends: ../../platform/workflows/_base.yaml

workflow:
  name: card-replacement
  description: Allow customers to request replacement cards (credit, debit, insurance)

  # card-replacement adds pii_redaction on top of the base mandatory guardrails
  guardrails:
    mandatory:
      - pii_redaction
    optional:
      - fraud_detection

  nodes:
    - id: replace_card
      type: subgraph
      subgraph: card_replacement_flow

    - id: track_card
      type: subgraph
      subgraph: card_tracking_flow

  edges:
    - from: collect_intent
      router: llm_intent
      description: "What does the customer need help with?"
      routes:
        replace_card: replace_card
        track_replacement: track_card
        other: greet

    - from: replace_card
      to: farewell
    - from: track_card
      to: farewell

# ─────────────────────────────────────────────────────────
# SUBGRAPH: Card Replacement Flow
# ─────────────────────────────────────────────────────────
subgraphs:
  card_replacement_flow:
    description: Multi-step flow to identify card, reason, and process replacement

    nodes:
      - id: identify_card
        type: llm_conversation
        prompt_template: "identify_card.jinja2"
        output_schema: CardIdentificationSchema

      - id: get_replacement_reason
        type: llm_conversation
        prompt_template: "replacement_reason.jinja2"
        output_schema: ReplacementReasonSchema

      - id: stolen_card_action
        type: custom
        handler: "features.card_replacement.handlers.block_stolen_card"

      - id: confirm_shipping_address
        type: llm_conversation
        prompt_template: "confirm_address.jinja2"
        output_schema: ShippingAddressSchema

      - id: select_delivery_speed
        type: llm_conversation
        prompt_template: "delivery_options.jinja2"
        output_schema: DeliveryOptionsSchema

      - id: check_replacement_fee
        type: custom
        handler: "features.card_replacement.handlers.calculate_replacement_fee"

      - id: show_fee_confirmation
        type: llm_response
        prompt_template: "fee_confirmation.jinja2"

      - id: process_replacement
        type: custom
        handler: "features.card_replacement.handlers.create_card_replacement_order"

      - id: replacement_confirmed
        type: llm_response
        prompt_template: "replacement_confirmation.jinja2"

      - id: fraud_escalation
        type: platform.human_handoff
        config:
          priority: high
          reason: potential_fraud

    edges:
      - from: START
        to: identify_card

      - from: identify_card
        router: llm_intent
        description: "Did the customer identify which card?"
        routes:
          card_identified: get_replacement_reason
          multiple_cards: identify_card
          no_cards_found: END

      - from: get_replacement_reason
        router: validation_result
        description: "What is the replacement reason?"
        routes:
          lost: confirm_shipping_address
          stolen: stolen_card_action
          damaged: confirm_shipping_address
          expired: confirm_shipping_address
          fraud_suspected:
            to: fraud_escalation
            label: "Potential fraud detected, escalate to specialist"

      - from: stolen_card_action
        router: validation_result
        description: "Was the stolen card blocked successfully?"
        routes:
          blocked: confirm_shipping_address
          error:
            to: fraud_escalation
            label: "Failed to block card, escalate urgently"

      - from: confirm_shipping_address
        router: llm_intent
        description: "Did the customer confirm shipping address?"
        routes:
          address_confirmed: select_delivery_speed
          update_address: confirm_shipping_address

      - from: select_delivery_speed
        router: llm_intent
        description: "Did the customer select delivery speed?"
        routes:
          speed_selected: check_replacement_fee
          questions: select_delivery_speed

      - from: check_replacement_fee
        router: validation_result
        description: "Does a replacement fee apply?"
        routes:
          fee_applies: show_fee_confirmation
          no_fee: process_replacement

      - from: show_fee_confirmation
        router: llm_intent
        description: "Did the customer accept the fee?"
        routes:
          accepted: process_replacement
          declined: END

      - from: process_replacement
        router: validation_result
        description: "Was the replacement order created?"
        routes:
          success: replacement_confirmed
          error: END

      - from: replacement_confirmed
        to: END

  # ─────────────────────────────────────────────────────────
  # SUBGRAPH: Card Tracking Flow
  # ─────────────────────────────────────────────────────────
  card_tracking_flow:
    description: Allow users to track status of replacement card shipment

    nodes:
      - id: get_tracking_info
        type: custom
        handler: "features.card_replacement.handlers.get_active_card_orders"

      - id: no_active_orders
        type: llm_response
        prompt_template: "no_active_orders.jinja2"

      - id: display_tracking
        type: llm_response
        prompt_template: "card_tracking_status.jinja2"

      - id: request_expedite
        type: custom
        handler: "features.card_replacement.handlers.expedite_card_shipment"

      - id: expedite_confirmed
        type: llm_response
        prompt_template: "expedite_confirmation.jinja2"

    edges:
      - from: START
        to: get_tracking_info

      - from: get_tracking_info
        router: validation_result
        description: "Are there active card orders?"
        routes:
          found: display_tracking
          not_found: no_active_orders

      - from: display_tracking
        router: llm_intent
        description: "Does the customer want to expedite?"
        routes:
          expedite: request_expedite
          satisfied: END

      - from: request_expedite
        router: validation_result
        description: "Was expedite request successful?"
        routes:
          success: expedite_confirmed
          not_available: display_tracking

      - from: expedite_confirmed
        to: END
      - from: no_active_orders
        to: END

# ─────────────────────────────────────────────────────────
# SCHEMAS: Structured output definitions
# ─────────────────────────────────────────────────────────
schemas:
  CardIdentificationSchema:
    type: object
    properties:
      card_type:
        type: string
        enum: [credit, debit, insurance, membership]
      card_last_four:
        type: string
        pattern: "^\\d{4}$"
      card_name:
        type: string
        description: Name on the card or card product name
    required: [card_type]

  ReplacementReasonSchema:
    type: object
    properties:
      reason:
        type: string
        enum: [lost, stolen, damaged, expired, name_change, fraud_suspected]
      additional_details:
        type: string
        maxLength: 500
      last_used_date:
        type: string
        format: date
        description: When the card was last used (for stolen cards)
    required: [reason]

  ShippingAddressSchema:
    type: object
    properties:
      use_address_on_file:
        type: boolean
      street_address:
        type: string
      city:
        type: string
      state:
        type: string
        pattern: "^[A-Z]{2}$"
      zip_code:
        type: string
        pattern: "^\\d{5}(-\\d{4})?$"
    required: [use_address_on_file]

  DeliveryOptionsSchema:
    type: object
    properties:
      delivery_speed:
        type: string
        enum: [standard, expedited, overnight]
      estimated_delivery:
        type: string
        description: Estimated delivery date range
      fee:
        type: number
        description: Delivery fee in dollars
    required: [delivery_speed]
